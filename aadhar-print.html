<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Aadhar Perfect Cutter - ToolFlyer</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-lg border">
        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Aadhar Bottom-33% Cutter</h2>
        
        <div class="border-4 border-dashed border-blue-200 p-10 text-center rounded-xl mb-6 cursor-pointer hover:bg-blue-50" onclick="document.getElementById('pdfInput').click()">
            <input type="file" id="pdfInput" accept=".pdf" class="hidden">
            <p class="text-blue-600 font-bold">Aadhar PDF Yahan Drop Karein</p>
        </div>

        <div id="passwordSection" class="hidden mb-4 p-4 bg-red-50 rounded-lg">
            <input type="password" id="pdfPass" placeholder="PDF Password" class="w-full p-2 border rounded mb-2">
            <button onclick="processAadhar()" class="w-full bg-red-600 text-white py-2 rounded">Unlock & Crop</button>
        </div>

        <button id="downloadBtn" class="hidden w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-md">
            DOWNLOAD A4 GRID PDF
        </button>
    </div>

    <script>
        let fileBytes = null;
        const { PDFDocument, PageSizes } = PDFLib;

        document.getElementById('pdfInput').onchange = async (e) => {
            const file = e.target.files[0];
            fileBytes = await file.arrayBuffer();
            processAadhar();
        };

        async function processAadhar() {
            const pass = document.getElementById('pdfPass').value;
            try {
                const srcDoc = await PDFDocument.load(fileBytes, { password: pass });
                const outDoc = await PDFDocument.create();
                const page = outDoc.addPage(PageSizes.A4);
                const { width, height } = page.getSize();

                const [embeddedPage] = await outDoc.embedPages(srcDoc.getPages());
                
                // Standard Card Size (Approx 85mm x 55mm)
                const cardW = 242; 
                const cardH = 155;

                // --- 33% BOTTOM CROP LOGIC ---
                // Neeche ke 33% hisse ko target karne ke liye clipY hamesha kam rahega (around 30-50 points)

                // 1. LEFT CARD (Front) - Bottom Left se crop
                page.drawPage(embeddedPage, {
                    x: 40, 
                    y: height - 180, // A4 ke top mein set karne ke liye
                    width: cardW, 
                    height: cardH,
                    clipX: 30,      // Left margin se cut
                    clipY: 30,      // Sabse neeche se cut (33% area)
                    clipWidth: cardW,
                    clipHeight: cardH
                });

                // 2. RIGHT CARD (Back) - Bottom Right se crop
                page.drawPage(embeddedPage, {
                    x: 40 + cardW + 15, // Front ke bagal mein doosra grid box
                    y: height - 180, 
                    width: cardW, 
                    height: cardH,
                    clipX: 303,     // Right margin se cut
                    clipY: 30,      // Sabse neeche se cut (33% area)
                    clipWidth: cardW,
                    clipHeight: cardH
                });

                const pdfBytes = await outDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const btn = document.getElementById('downloadBtn');
                btn.classList.remove('hidden');
                document.getElementById('passwordSection').classList.add('hidden');
                
                btn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "Aadhar_A4_Top_Grid.pdf";
                    a.click();
                };
            } catch (err) {
                if (err.message.includes('encrypted')) {
                    document.getElementById('passwordSection').classList.remove('hidden');
                } else { alert("Galti: " + err.message); }
            }
        }
    </script>
</body>
</html>
