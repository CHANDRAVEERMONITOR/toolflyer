<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Aadhaar Smart Print - ToolFlyer Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-5">

    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl p-8 border">
        <h1 class="text-3xl font-black text-center text-blue-700 mb-6 uppercase">Aadhaar Master Cutter</h1>

        <div id="uploadBox" class="border-4 border-dashed border-gray-200 p-10 text-center rounded-2xl cursor-pointer hover:bg-blue-50" onclick="document.getElementById('pdfInput').click()">
            <input type="file" id="pdfInput" accept="application/pdf" class="hidden">
            <p id="fileName" class="text-gray-500 font-bold">Select Aadhaar PDF (Password Protected)</p>
        </div>

        <div id="passArea" class="hidden mt-6 p-6 bg-blue-50 rounded-2xl border-2 border-blue-200">
            <label class="block text-blue-800 font-bold mb-2 uppercase text-xs tracking-widest">Apna Aadhaar Password Dalein:</label>
            <div class="flex gap-2">
                <input type="text" id="pdfPass" placeholder="e.g. RAMA1998" class="flex-grow p-4 rounded-xl border-2 border-blue-300 outline-none font-bold uppercase tracking-widest">
                <button onclick="startProcessing()" class="bg-blue-600 text-white px-8 rounded-xl font-black hover:bg-blue-700 shadow-lg">PROCESS</button>
            </div>
            <p class="text-[10px] text-blue-400 mt-2 italic">*Aapke Naam ke 4 Akshar + Janm ka Saal (e.g., AMIT1990)</p>
        </div>

        <div id="loader" class="hidden mt-8 text-center text-blue-600 font-black animate-pulse uppercase">
            🚀 High Quality Cutting in Progress...
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

        let fileArrayBuffer = null;

        document.getElementById('pdfInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                fileArrayBuffer = new Uint8Array(this.result);
                document.getElementById('fileName').innerText = "Selected: " + file.name;
                document.getElementById('passArea').classList.remove('hidden');
                document.getElementById('uploadBox').classList.add('opacity-50');
            };
            reader.readAsArrayBuffer(file);
        };

        async function startProcessing() {
            const pass = document.getElementById('pdfPass').value.trim();
            const loader = document.getElementById('loader');

            if(!pass) { alert("Bhai, pehle password toh dalo!"); return; }
            if(!fileArrayBuffer) { alert("File nahi mili!"); return; }

            loader.classList.remove('hidden');

            try {
                // IMPORTANT: Har baar naya buffer bhej rahe hain taaki memory error na aaye
                const currentBuffer = new Uint8Array(fileArrayBuffer);

                const loadingTask = pdfjsLib.getDocument({
                    data: currentBuffer,
                    password: pass,
                    stopAtErrors: false // Isse processing nahi rukegi
                });

                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);

                const viewport = page.getViewport({ scale: 4.0 }); // Full HD Quality
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({ canvasContext: ctx, viewport }).promise;

                // India Aadhar Bottom-33% Exact Crop
                const cropH = canvas.height * 0.31;
                const cropY = canvas.height - cropH - (canvas.height * 0.02);

                const getPart = (startX, width) => {
                    const c = document.createElement('canvas');
                    c.width = width; c.height = cropH;
                    c.getContext('2d').drawImage(canvas, startX, cropY, width, cropH, 0, 0, width, cropH);
                    return c.toDataURL("image/jpeg", 1.0);
                };

                const halfW = canvas.width / 2;
                const frontImg = getPart(40, halfW - 60); 
                const backImg = getPart(halfW + 20, halfW - 60);

                const { jsPDF } = window.jspdf;
                const pdfOut = new jsPDF('p','mm','a4');

                const w = 86; const h = 54;
                const startX = (210 - (w*2 + 8)) / 2;

                pdfOut.addImage(frontImg, 'JPEG', startX, 20, w, h);
                pdfOut.addImage(backImg, 'JPEG', startX + w + 8, 20, w, h);

                // Cut-marks Border
                pdfOut.setDrawColor(220);
                pdfOut.rect(startX-0.1, 19.9, w+0.2, h+0.2);
                pdfOut.rect(startX+w+8-0.1, 19.9, w+0.2, h+0.2);

                pdfOut.save("Aadhar_Final_Print_ToolFlyer.pdf");
                loader.classList.add('hidden');

            } catch (err) {
                loader.classList.add('hidden');
                console.error(err);
                if (err.name === "PasswordException") {
                    alert("❌ Password Galat Hai! Dubara sahi password dalein.");
                } else {
                    alert("Galti: " + err.message);
                }
            }
        }
    </script>
</body>
</html>
