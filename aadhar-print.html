<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhaar Smart Print - ToolFlyer</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="max-w-3xl mx-auto py-12 px-4">
        <div class="bg-white rounded-3xl overflow-hidden card-shadow border border-gray-100">
            <div class="gradient-bg p-8 text-white text-center">
                <h1 class="text-3xl font-black mb-1">AADHAAR SMART PRINT</h1>
                <p class="text-blue-100 opacity-90 text-sm">Auto-Crop Bottom 33% | No Extra Margins</p>
            </div>

            <div class="p-8">
                <div class="flex justify-between mb-10 text-xs font-bold text-gray-400 uppercase tracking-widest">
                    <div class="flex flex-col items-center gap-2 text-blue-600">
                        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">1</div>
                        <span>Upload</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">2</div>
                        <span>Smart Crop</span>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">3</div>
                        <span>Print A4</span>
                    </div>
                </div>

                <div id="dropZone" class="border-2 border-dashed border-blue-200 bg-blue-50 rounded-2xl p-10 text-center cursor-pointer hover:border-blue-400 transition-all" onclick="document.getElementById('pdfInput').click()">
                    <input type="file" id="pdfInput" accept="application/pdf" class="hidden">
                    <svg class="w-12 h-12 text-blue-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-width="2" stroke-linecap="round"></path></svg>
                    <p class="text-lg font-bold text-blue-800">Aadhaar PDF Select Karein</p>
                </div>

                <div id="passArea" class="hidden mt-6 p-4 bg-orange-50 border border-orange-200 rounded-xl">
                    <p class="text-orange-700 font-bold text-sm mb-2 italic">⚠️ PDF Password Protected Hai</p>
                    <div class="flex gap-2">
                        <input type="password" id="pdfPass" placeholder="e.g. ABHI1995" class="flex-grow p-3 rounded-lg border-2 border-orange-200 focus:outline-none focus:border-orange-400">
                        <button onclick="processAadhar()" class="bg-orange-500 text-white px-6 rounded-lg font-bold">Unlock</button>
                    </div>
                </div>

                <div id="loader" class="hidden mt-6 text-center text-blue-600 font-bold animate-pulse">Cutting Cards... Please Wait</div>

                <button id="dlBtn" class="hidden mt-8 w-full bg-green-600 text-white py-4 rounded-xl font-black text-xl shadow-lg hover:bg-green-700 transform active:scale-95 transition-all">
                    DOWNLOAD A4 PRINT PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        let fileBytes = null;
        const { PDFDocument, PageSizes, rgb } = PDFLib;

        document.getElementById('pdfInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            fileBytes = await file.arrayBuffer();
            processAadhar();
        };

        async function processAadhar() {
            const pass = document.getElementById('pdfPass').value;
            const loader = document.getElementById('loader');
            const passArea = document.getElementById('passArea');
            const dlBtn = document.getElementById('dlBtn');

            loader.classList.remove('hidden');
            passArea.classList.add('hidden');

            try {
                const srcDoc = await PDFDocument.load(fileBytes, { password: pass });
                const outDoc = await PDFDocument.create();
                const page = outDoc.addPage(PageSizes.A4);
                const { width, height } = page.getSize();

                const [embeddedPage] = await outDoc.embedPages(srcDoc.getPages());
                
                // Standard Card Size (Points: 86mm x 54mm approx)
                const cardW = 242; 
                const cardH = 155;

                // CENTER POSITION CALCULATION
                const gap = 15;
                const totalWidth = (cardW * 2) + gap;
                const startX = (width - totalWidth) / 2;
                const startY = height - 200;

                // --- PRECISION CROP LOGIC (Sudhara Hua) ---
                
                // 1. FRONT SIDE (Bottom Left)
                page.drawPage(embeddedPage, {
                    x: startX, y: startY, width: cardW, height: cardH,
                    clipX: 32, clipY: 35, clipWidth: cardW, clipHeight: cardH
                });

                // 2. BACK SIDE (Bottom Right)
                page.drawPage(embeddedPage, {
                    x: startX + cardW + gap, y: startY, width: cardW, height: cardH,
                    clipX: 304, clipY: 35, clipWidth: cardW, clipHeight: cardH
                });

                // Cutting Guides (Light Grey Borders)
                const drawBorder = (x) => {
                    page.drawRectangle({
                        x: x - 1, y: startY - 1, width: cardW + 2, height: cardH + 2,
                        borderColor: rgb(0.85, 0.85, 0.85), borderWidth: 0.5
                    });
                };
                drawBorder(startX);
                drawBorder(startX + cardW + gap);

                const pdfBytes = await outDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                
                loader.classList.add('hidden');
                dlBtn.classList.remove('hidden');
                dlBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "Aadhar_Smart_Print_ToolFlyer.pdf";
                    a.click();
                };

            } catch (err) {
                loader.classList.add('hidden');
                if (err.message.includes('encrypted')) {
                    passArea.classList.remove('hidden');
                } else { alert("Galti: " + err.message); }
            }
        }
    </script>
</body>
</html>
