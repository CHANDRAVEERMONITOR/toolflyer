<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aadhar Card A4 Print Tool - ToolFlyer</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-5">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h2 class="text-3xl font-bold text-center mb-6">Aadhar A4 Print Tool</h2>
        <p class="text-center text-gray-500 mb-8 text-sm">Niche ke do cards ko crop karke A4 top par set karein.</p>
        
        <div class="border-2 border-dashed border-blue-400 p-10 text-center rounded-lg mb-4 cursor-pointer" id="drop-zone" onclick="document.getElementById('pdfInput').click()">
            <input type="file" id="pdfInput" accept=".pdf" class="hidden">
            <p class="text-blue-600 font-semibold">Aadhar PDF Select Karein</p>
        </div>

        <div id="passwordArea" class="hidden mb-6 p-4 bg-orange-50 rounded-lg border">
            <p class="text-orange-700 text-sm font-bold mb-2">Password Protected PDF</p>
            <input type="password" id="pdfPassword" placeholder="e.g. ABHIS1995" class="w-full p-3 border rounded-md">
            <button onclick="processAadhar()" class="mt-3 w-full bg-orange-500 text-white py-2 rounded-md font-bold">Process</button>
        </div>

        <div id="status" class="hidden text-center p-4">
            <p id="statusText" class="text-blue-500 font-medium italic">Processing...</p>
        </div>

        <button id="downloadBtn" class="hidden w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">
            Print Ready PDF Download Karein
        </button>
    </div>

    <script>
        let currentFileBytes = null;
        const pdfInput = document.getElementById('pdfInput');
        const passwordArea = document.getElementById('passwordArea');
        const pdfPassword = document.getElementById('pdfPassword');
        const downloadBtn = document.getElementById('downloadBtn');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');

        pdfInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFileBytes = await file.arrayBuffer();
            try {
                await PDFLib.PDFDocument.load(currentFileBytes);
                processAadhar(); 
            } catch (err) {
                if (err.message.includes('encrypted')) {
                    passwordArea.classList.remove('hidden');
                } else { alert("File sahi nahi hai."); }
            }
        });

        async function processAadhar() {
            passwordArea.classList.add('hidden');
            status.classList.remove('hidden');
            statusText.innerText = "Layout Banaya Ja Raha Hai...";

            try {
                const password = pdfPassword.value;
                const pdfDoc = await PDFLib.PDFDocument.load(currentFileBytes, { password });
                
                const outDoc = await PDFLib.PDFDocument.create();
                const page = outDoc.addPage(PDFLib.PageSizes.A4);
                const { width, height } = page.getSize();

                const embeddedPage = await outDoc.embedPage(pdfDoc.getPages()[0]);

                // Aadhar Size (Approx 8.6cm x 5.4cm) - points mein
                const cW = 243; 
                const cH = 153;

                // --- ASLI CROP LOGIC YAHAN HAI ---

                // 1. FRONT SIDE (Target: Bottom Left)
                // x=30 (x-coordinate where crop starts), y=30 (y-coordinate)
                page.drawPage(embeddedPage, {
                    x: 40, 
                    y: height - 180, 
                    width: cW, 
                    height: cH,
                    // CROP SETTINGS: Points mein batana hai kahan se cut karein
                    clipX: 30, // Left edge se kitna andar
                    clipY: 30, // Bottom edge se kitna upar
                    clipWidth: cW, // Card ki width kitni crop karein
                    clipHeight: cH, // Card ki height kitni crop karein
                });

                // 2. BACK SIDE (Target: Bottom Right)
                // y ko target karne ke liye clipX ko badhana padega
                page.drawPage(embeddedPage, {
                    x: 40 + cW + 15, // Front ke theek bagal mein
                    y: height - 180, 
                    width: cW, 
                    height: cH,
                    // CROP SETTINGS for BACK SIDE
                    clipX: 305, // Isse hum right wale card par pahunchenge
                    clipY: 30, 
                    clipWidth: cW, 
                    clipHeight: cH,
                });

                const pdfBytes = await outDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                downloadBtn.classList.remove('hidden');
                status.classList.add('hidden');
                
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "Aadhar_Print_Crop_ToolFlyer.pdf";
                    a.click();
                };
            } catch (err) {
                alert("Galat Password!");
                status.classList.add('hidden');
                passwordArea.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
