<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar PDF Print Tool - ToolFlyer</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body {font-family: Arial; text-align:center; background:#f4f4f4;}
.container {background:#fff; padding:20px; margin:20px auto; max-width:800px; border-radius:10px;}
input {margin:10px; padding:10px;}
button {padding:12px 25px; background:#2ecc71; color:#fff; border:none; border-radius:5px; cursor:pointer;}
canvas {display:none;}
</style></head><body><div class="container">
<h2>Aadhaar PDF to A4 Print (Auto Grid)</h2>
<p>Upload Aadhaar PDF → Auto Split → Download A4 Print</p><input type="file" id="pdfInput" accept="application/pdf"><br>
<button onclick="processPDF()">Generate Print PDF</button>

</div><canvas id="pdfCanvas"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function processPDF() {
    const file = document.getElementById('pdfInput').files[0];
    if (!file) {
        alert("Please upload Aadhaar PDF");
        return;
    }

    const fileReader = new FileReader();
    fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);

        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        const page = await pdf.getPage(1);

        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.getElementById('pdfCanvas');
        const context = canvas.getContext('2d');

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;

        // Split front & back (top/bottom)
        const halfHeight = canvas.height / 2;

        const front = context.getImageData(0, 0, canvas.width, halfHeight);
        const back = context.getImageData(0, halfHeight, canvas.width, halfHeight);

        // Create temp canvas
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        tempCanvas.width = canvas.width;
        tempCanvas.height = halfHeight;

        tempCtx.putImageData(front, 0, 0);
        const frontImg = tempCanvas.toDataURL("image/jpeg");

        tempCtx.clearRect(0,0,tempCanvas.width,tempCanvas.height);
        tempCtx.putImageData(back, 0, 0);
        const backImg = tempCanvas.toDataURL("image/jpeg");

        generateA4(frontImg, backImg);
    };

    fileReader.readAsArrayBuffer(file);
}

async function generateA4(frontImg, backImg) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');

    const cardW = 85.6;
    const cardH = 54;

    let x = 10, y = 10;

    for(let i=0;i<4;i++){
        pdf.addImage(frontImg, 'JPEG', x, y, cardW, cardH);
        pdf.addImage(backImg, 'JPEG', x, y + cardH + 5, cardW, cardH);

        x += cardW + 10;

        if(x > 150){
            x = 10;
            y += (cardH*2) + 20;
        }
    }

    pdf.save("aadhaar-print.pdf");
}
</script></body>
</html>
