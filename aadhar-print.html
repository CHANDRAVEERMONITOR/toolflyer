<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolFlyer Aadhaar Print PRO</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{
background:linear-gradient(135deg,#6c5ce7,#00cec9);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

/* CARD */
.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
width:90%;
max-width:500px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h1{font-size:1.5rem;margin-bottom:10px;}

/* UPLOAD */
.upload{
border:2px dashed rgba(255,255,255,0.6);
padding:25px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
margin-top:15px;
}
.upload:hover{background:rgba(255,255,255,0.1);}

/* BUTTON */
button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:10px;
background:#00b894;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
button:hover{background:#00cec9;}

/* DOWNLOAD BTN */
.download{
display:none;
background:#fdcb6e;
color:#000;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* LOADER */
.loader{
display:none;
margin-top:15px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid #fff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}
@keyframes spin{100%{transform:rotate(360deg);}}

/* PREVIEW */
.preview{
display:none;
margin-top:15px;
}
.preview img{
width:100%;
border-radius:10px;
}

/* SUCCESS */
.success{
display:none;
margin-top:10px;
color:#ffeaa7;
font-weight:bold;
animation:fade 1s ease;
}
@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style></head><body><div class="container">
<h1>✨ Aadhaar Print PRO</h1>
<p>Upload → Preview → Auto Crop → Download A4</p><div class="upload" onclick="document.getElementById('pdfInput').click()">
📄 Upload Aadhaar PDF
</div><input type="file" id="pdfInput" hidden accept="application/pdf"><div class="preview" id="previewBox">
<img id="previewImg">
</div><button onclick="processPDF()">🚀 Generate PDF</button>

<div class="loader" id="loader"></div>
<div class="success" id="successMsg">✅ PDF Ready! Click Download</div><button class="download" id="downloadBtn">⬇ Download PDF</button>

</div><canvas id="canvas" style="display:none;"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let finalPDFBlob = null;

document.getElementById('pdfInput').addEventListener('change', function(e){
const file = e.target.files[0];
if(file){
const url = URL.createObjectURL(file);
document.getElementById('previewImg').src = url;
document.getElementById('previewBox').style.display = 'block';
}
});

async function processPDF(){

const file=document.getElementById('pdfInput').files[0];
if(!file){alert("Upload PDF");return;}

document.getElementById('loader').style.display='block';
document.getElementById('successMsg').style.display='none';

const reader=new FileReader();

reader.onload=async function(){

const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
const page=await pdf.getPage(1);

const viewport=page.getViewport({scale:2});
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

canvas.width=viewport.width;
canvas.height=viewport.height;

await page.render({canvasContext:ctx,viewport}).promise;

// crop 33%
const cropH=canvas.height*0.33;
const cropY=canvas.height-cropH;

const data=ctx.getImageData(0,cropY,canvas.width,cropH);

// temp
const temp=document.createElement('canvas');
const tctx=temp.getContext('2d');
temp.width=canvas.width;
temp.height=cropH;
tctx.putImageData(data,0,0);

// split
const half=temp.width/2;

function makeImg(x){
const c=document.createElement('canvas');
c.width=half; c.height=cropH;
c.getContext('2d').putImageData(
tctx.getImageData(x,0,half,cropH),0,0);
return c.toDataURL("image/jpeg");
}

const frontImg=makeImg(0);
const backImg=makeImg(half);

// PDF
const {jsPDF}=window.jspdf;
const pdfOut=new jsPDF('p','mm','a4');

const w=85,h=54;
const startX=(210-(w*2+10))/2;

pdfOut.addImage(frontImg,'JPEG',startX,20,w,h);
pdfOut.addImage(backImg,'JPEG',startX+w+10,20,w,h);

// convert to blob
finalPDFBlob = pdfOut.output('blob');

document.getElementById('loader').style.display='none';
document.getElementById('successMsg').style.display='block';
document.getElementById('downloadBtn').style.display='block';

};

reader.readAsArrayBuffer(file);
}

// download
document.getElementById('downloadBtn').onclick=function(){
if(finalPDFBlob){
const link=document.createElement('a');
link.href=URL.createObjectURL(finalPDFBlob);
link.download="aadhaar-print.pdf";
link.click();
}
};
</script></body>
</html>
