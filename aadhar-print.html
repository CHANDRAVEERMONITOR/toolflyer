<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar Smart Print Tool</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body {font-family:Arial; text-align:center; background:#f4f4f4;}
.box {background:#fff; padding:20px; margin:20px auto; max-width:600px; border-radius:10px;}
button {padding:12px 25px; background:#2ecc71; color:#fff; border:none; border-radius:5px;}
</style></head><body><div class="box">
<h2>Aadhaar PDF → Smart Print</h2>
<p>Auto detect bottom 28% → Front + Back → A4 Print</p><input type="file" id="pdfInput" accept="application/pdf"><br><br>
<button onclick="processPDF()">Generate A4</button>

</div><canvas id="canvas" style="display:none;"></canvas>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function processPDF() {

const file = document.getElementById('pdfInput').files[0];
if(!file){ alert("Upload PDF"); return; }

const reader = new FileReader();

reader.onload = async function() {

const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
const page = await pdf.getPage(1);

const viewport = page.getViewport({ scale: 2 });

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({ canvasContext: ctx, viewport }).promise;

// 🔥 STEP 1: Bottom 28% crop
const cropHeight = canvas.height * 0.28;
const cropY = canvas.height - cropHeight;

const cropData = ctx.getImageData(0, cropY, canvas.width, cropHeight);

// temp canvas
const temp = document.createElement('canvas');
const tctx = temp.getContext('2d');

temp.width = canvas.width;
temp.height = cropHeight;

tctx.putImageData(cropData, 0, 0);

// 🔥 STEP 2: Split Left/Right (Front/Back)
const halfW = temp.width / 2;

const frontData = tctx.getImageData(0, 0, halfW, cropHeight);
const backData = tctx.getImageData(halfW, 0, halfW, cropHeight);

// create front image
const c1 = document.createElement('canvas');
c1.width = halfW; c1.height = cropHeight;
c1.getContext('2d').putImageData(frontData, 0, 0);
const frontImg = c1.toDataURL("image/jpeg");

// create back image
const c2 = document.createElement('canvas');
c2.width = halfW; c2.height = cropHeight;
c2.getContext('2d').putImageData(backData, 0, 0);
const backImg = c2.toDataURL("image/jpeg");

// 🔥 STEP 3: Create A4 PDF (2 GRID ONLY)
const { jsPDF } = window.jspdf;
const pdfOut = new jsPDF('p','mm','a4');

// Aadhaar size
const w = 85;
const h = 50;

// center alignment
const pageW = 210;
const startX = (pageW - (w*2 + 10)) / 2;

pdfOut.addImage(frontImg, 'JPEG', startX, 20, w, h);
pdfOut.addImage(backImg, 'JPEG', startX + w + 10, 20, w, h);

pdfOut.save("aadhaar-final-print.pdf");

};

reader.readAsArrayBuffer(file);
}
</script></body>
</html>
