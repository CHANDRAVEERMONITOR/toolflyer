<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadhaar Manual Crop PRO</title><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body{
font-family:Arial;
background:linear-gradient(135deg,#6c5ce7,#00cec9);
color:#fff;
text-align:center;
}

/* container */
.box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
margin:20px auto;
padding:20px;
border-radius:15px;
max-width:600px;
}

/* canvas wrapper */
.canvasWrap{
position:relative;
margin-top:15px;
}

/* crop box */
.cropBox{
position:absolute;
border:2px dashed #fff;
cursor:move;
}

/* resize handle */
.resize{
width:12px;
height:12px;
background:#fff;
position:absolute;
right:-6px;
bottom:-6px;
cursor:nwse-resize;
}

button{
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:#00b894;
color:#fff;
cursor:pointer;
}
</style></head><body><div class="box">
<h2>🧠 Aadhaar Manual Crop Tool</h2><input type="file" id="pdfInput" accept="application/pdf"><br>
<button onclick="loadPDF()">Load PDF</button>

<div class="canvasWrap">
<canvas id="canvas"></canvas>
<div id="cropBox" class="cropBox">
<div class="resize"></div>
</div>
</div><button onclick="generatePDF()">Generate A4 PDF</button>

</div><script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let cropBox = document.getElementById('cropBox');

let dragging=false, resizing=false;
let offsetX, offsetY;

async function loadPDF(){
const file=document.getElementById('pdfInput').files[0];
if(!file) return alert("Upload PDF");

const reader=new FileReader();

reader.onload=async function(){
const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
const page=await pdf.getPage(1);

const viewport=page.getViewport({scale:2});

canvas.width=viewport.width;
canvas.height=viewport.height;

await page.render({canvasContext:ctx,viewport}).promise;

// default crop position
cropBox.style.width = canvas.width*0.8+"px";
cropBox.style.height = canvas.height*0.3+"px";
cropBox.style.left = canvas.width*0.1+"px";
cropBox.style.top = canvas.height*0.65+"px";
};

reader.readAsArrayBuffer(file);
}

// drag logic
cropBox.onmousedown = function(e){
if(e.target.classList.contains('resize')){
resizing=true;
}else{
dragging=true;
offsetX=e.offsetX;
offsetY=e.offsetY;
}
};

document.onmousemove = function(e){
if(dragging){
cropBox.style.left = (e.pageX - canvas.offsetLeft - offsetX)+"px";
cropBox.style.top = (e.pageY - canvas.offsetTop - offsetY)+"px";
}
if(resizing){
cropBox.style.width = (e.pageX - canvas.offsetLeft - cropBox.offsetLeft)+"px";
cropBox.style.height = (e.pageY - canvas.offsetTop - cropBox.offsetTop)+"px";
}
};

document.onmouseup = function(){
dragging=false;
resizing=false;
};

// generate PDF
function generatePDF(){

const rect = cropBox.getBoundingClientRect();
const canvasRect = canvas.getBoundingClientRect();

const scaleX = canvas.width / canvasRect.width;
const scaleY = canvas.height / canvasRect.height;

const x = (rect.left - canvasRect.left) * scaleX;
const y = (rect.top - canvasRect.top) * scaleY;
const w = rect.width * scaleX;
const h = rect.height * scaleY;

// crop data
const imgData = ctx.getImageData(x,y,w,h);

// temp canvas
const temp = document.createElement('canvas');
const tctx = temp.getContext('2d');

temp.width = w;
temp.height = h;
tctx.putImageData(imgData,0,0);

// split front/back
const half = w/2;

function makeImg(startX){
const c=document.createElement('canvas');
c.width=half; c.height=h;
c.getContext('2d').putImageData(
tctx.getImageData(startX,0,half,h),0,0);
return c.toDataURL("image/jpeg");
}

const front = makeImg(0);
const back = makeImg(half);

// PDF
const {jsPDF}=window.jspdf;
const pdf=new jsPDF('p','mm','a4');

const cardW=85, cardH=54;
const startXpdf=(210-(cardW*2+10))/2;

pdf.addImage(front,'JPEG',startXpdf,20,cardW,cardH);
pdf.addImage(back,'JPEG',startXpdf+cardW+10,20,cardW,cardH);

pdf.save("aadhaar-manual.pdf");
}
</script></body>
</html>
