<script>
    // FIX: Variable ka naam badal diya taaki error na aaye
    const supabaseClient = supabase.createClient('https://efgvsddclcnbmwqbtily.supabase.co', 'YAHAN_APNI_ANON_KEY_DAALEIN');

    const fileInput = document.getElementById('fileInput');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusLabel');
    const percentText = document.getElementById('percentText');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('drop-zone').classList.add('hidden');
        document.getElementById('previewArea').classList.remove('hidden');
        document.getElementById('previewName').innerText = file.name;
        document.getElementById('previewSize').innerText = (file.size / (1024*1024)).toFixed(2) + " MB";

        await handleUpload(file);
    });

    async function handleUpload(file) {
        document.getElementById('status').classList.remove('hidden');
        const fileName = `${Date.now()}_${file.name}`;
        
        let progress = 0;
        const interval = setInterval(() => {
            if(progress < 90) {
                progress += Math.random() * 10;
                updateProgress(Math.min(progress, 90), "Uploading to Server...");
            }
        }, 500);

        // FIX: 'pdfs' bucket name sahi hai aur supabaseClient use kiya
        const { data, error } = await supabaseClient.storage.from('pdfs').upload(fileName, file);

        clearInterval(interval);
        if (error) {
            updateProgress(0, "Error: " + error.message);
            console.error(error);
            return;
        }

        updateProgress(95, "Compressing (AI)...");
        processOnServer(fileName);
    }

    async function processOnServer(fileName) {
        // FIX: Yahan bhi supabaseClient use karein
        const { data, error } = await supabaseClient.functions.invoke('compress-pdf', {
            body: { fileName: fileName }
        });

        if (data) {
            updateProgress(100, "Ready for Download!");
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.classList.remove('hidden');
            
            const finalUrl = `https://efgvsddclcnbmwqbtily.supabase.co/storage/v1/object/public/pdfs/${data.downloadPath}`;
            downloadBtn.href = finalUrl;
        } else if (error) {
            updateProgress(0, "Compression Error");
            console.error(error);
        }
    }

    function updateProgress(val, text) {
        progressBar.style.width = val + "%";
        percentText.innerText = Math.round(val) + "%";
        statusText.innerText = text;
    }
</script>
