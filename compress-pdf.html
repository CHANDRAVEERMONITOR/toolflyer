<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme PDF Compressor - ToolFlyer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e74c3c; --bg: #f5f6fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); text-align: center; padding: 20px; }
        .upload-box { border: 2px dashed #ccc; padding: 40px; border-radius: 15px; background: white; max-width: 500px; margin: auto; cursor: pointer; }
        .slider-box { margin-top: 20px; background: white; padding: 20px; border-radius: 15px; display: none; max-width: 500px; margin-left: auto; margin-right: auto; }
        input[type=range] { width: 100%; accent-color: var(--primary); }
        button { padding: 12px 30px; border: none; background: var(--primary); color: white; border-radius: 25px; cursor: pointer; margin-top: 15px; font-weight: 600; }
        #status { margin-top: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<h1>Extreme PDF Compressor</h1>
<p>PDF to Image reconstruction for maximum size reduction.</p>

<div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <p id="fileName">Select PDF to Shrink</p>
    <input type="file" id="fileInput" hidden accept="application/pdf">
</div>

<div class="slider-box" id="controls">
    <p>Compression Quality: <span id="qVal">0.5</span></p>
    <input type="range" id="quality" min="0.1" max="0.9" step="0.1" value="0.5">
    <br>
    <button onclick="processExtremeCompression()">Start Extreme Compression</button>
</div>

<div id="status"></div>
<div id="result"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

let selectedFile = null;
const qualitySlider = document.getElementById('quality');
const qVal = document.getElementById('qVal');

qualitySlider.oninput = function() { qVal.innerText = this.value; }

document.getElementById('fileInput').onchange = (e) => {
    selectedFile = e.target.files[0];
    if(selectedFile) {
        document.getElementById('fileName').innerText = selectedFile.name;
        document.getElementById('controls').style.display = 'block';
    }
};

async function processExtremeCompression() {
    const status = document.getElementById('status');
    status.innerText = "Step 1: Converting PDF to Images...";
    
    const fileReader = new FileReader();
    fileReader.readAsArrayBuffer(selectedFile);
    
    fileReader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        const outPdfDoc = await PDFLib.PDFDocument.create();
        const quality = parseFloat(qualitySlider.value);

        for (let i = 1; i <= pdf.numPages; i++) {
            status.innerText = `Processing Page ${i} of ${pdf.numPages}...`;
            
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1.5 }); // Lower scale = Smaller size
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;

            // Step 2: Convert Canvas to Compressed Image (JPEG)
            const imgData = canvas.toDataURL('image/jpeg', quality);
            const img = await outPdfDoc.embedImg(imgData);

            // Step 3: Add back to new PDF
            const newPage = outPdfDoc.addPage([img.width, img.height]);
            newPage.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
        }

        const pdfBytes = await outPdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        
        status.innerText = "Compression Complete!";
        const oldSize = (selectedFile.size / 1024).toFixed(0);
        const newSize = (blob.size / 1024).toFixed(0);

        document.getElementById('result').innerHTML = `
            <div style="margin-top:20px; padding:20px; background:white; border-radius:10px;">
                <p>Old Size: ${oldSize} KB | New Size: ${newSize} KB</p>
                <button onclick="downloadFinal('${URL.createObjectURL(blob)}')">Download PDF</button>
            </div>
        `;
    };
}

function downloadFinal(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = "ToolFlyer_Extreme_Compressed.pdf";
    a.click();
}
</script>
</body>
</html>
