<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Advanced PDF Compressor - ToolFlyer</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script><style>

body{
font-family:Poppins;
background:#f5f6fa;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

.upload{
border:2px dashed #ccc;
padding:40px;
border-radius:15px;
cursor:pointer;
background:white;
max-width:500px;
margin:auto;
}

.upload:hover{
border-color:#e74c3c;
}

.sliderBox{
margin-top:30px;
display:none;
}

input[type=range]{
width:90%;
}

.progress{
width:90%;
height:10px;
background:#ddd;
margin:20px auto;
border-radius:20px;
overflow:hidden;
display:none;
}

.bar{
height:100%;
width:0%;
background:#e74c3c;
}

button{
padding:14px 30px;
border:none;
background:#e74c3c;
color:white;
font-size:16px;
border-radius:25px;
cursor:pointer;
margin-top:20px;
}

#result{
margin-top:20px;
font-weight:600;
}

</style></head>
<body><h1>ToolFlyer PDF Compressor</h1>
<p>Reduce PDF size instantly with adjustable compression</p><div class="upload" onclick="fileInput.click()">Upload PDF File

<input type="file" id="fileInput" hidden accept="application/pdf"></div><div class="sliderBox" id="sliderBox"><p>Compression Level: <span id="percent">50%</span></p><input type="range" min="10" max="90" value="50" id="slider"><br><button onclick="compressPDF()">Compress PDF</button>

</div><div class="progress" id="progress"><div class="bar" id="bar"></div></div><div id="result"></div><script>

let file=null

const fileInput=document.getElementById("fileInput")
const slider=document.getElementById("slider")
const percent=document.getElementById("percent")
const sliderBox=document.getElementById("sliderBox")
const progress=document.getElementById("progress")
const bar=document.getElementById("bar")

slider.oninput=function(){

percent.innerText=this.value+"%"

}

fileInput.onchange=function(e){

file=e.target.files[0]

if(file){

sliderBox.style.display="block"

}

}

async function compressPDF(){

if(!file) return

progress.style.display="block"

bar.style.width="10%"

const compression=slider.value

const arrayBuffer=await file.arrayBuffer()

bar.style.width="30%"

const pdfDoc=await PDFLib.PDFDocument.load(arrayBuffer)

bar.style.width="50%"

pdfDoc.setTitle("")
pdfDoc.setAuthor("")
pdfDoc.setSubject("")
pdfDoc.setCreator("")
pdfDoc.setProducer("")

const pages=pdfDoc.getPages()

pages.forEach(page=>{

let scale=1-(compression/150)

page.scaleContent(scale,scale)

})

bar.style.width="70%"

const compressedBytes=await pdfDoc.save({

useObjectStreams:true,
objectsPerTick:50

})

bar.style.width="100%"

const blob=new Blob([compressedBytes],{type:"application/pdf"})

const newSize=(blob.size/1024/1024).toFixed(2)

const oldSize=(file.size/1024/1024).toFixed(2)

document.getElementById("result").innerHTML=

"Original Size: "+oldSize+" MB<br>"+
"Compressed Size: "+newSize+" MB<br><br>"+
"<button onclick='downloadFile()'>Download PDF</button>"

window.compressedBlob=blob

}

function downloadFile(){

const link=document.createElement("a")

link.href=URL.createObjectURL(window.compressedBlob)

link.download="ToolFlyer_Compressed.pdf"

link.click()

}

</script></body>
</html>
