<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Compress PDF - ToolFlyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="p-4 border-b bg-white flex items-center">
        <a href="index.html"><img src="logo.png" class="h-8"></a>
        <span class="ml-2 font-bold text-blue-600">Compress PDF</span>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-xl w-full bg-white p-8 rounded-2xl shadow-xl border text-center">
            <h1 class="text-2xl font-bold mb-4">Compress PDF File</h1>
            <p class="text-gray-500 mb-6">PDF size kam karein bina quality kharabe kiye.</p>
            
            <div id="drop-zone" class="border-3 border-dashed border-blue-200 p-10 rounded-xl bg-blue-50 cursor-pointer hover:bg-blue-100 transition">
                <input type="file" id="fileInput" class="hidden" accept=".pdf">
                <i class="fas fa-file-pdf text-4xl text-blue-400 mb-3"></i>
                <p class="font-semibold">Select PDF File</p>
                <p class="text-xs text-gray-400 mt-1">(Files > 50MB will be uploaded in partitions)</p>
            </div>

            <div id="status" class="mt-6 hidden">
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
                <p id="statusText" class="text-sm mt-2 text-gray-600 font-medium">Uploading...</p>
            </div>

            <a id="downloadBtn" class="mt-6 hidden bg-green-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-green-700 transition inline-block">
                Download Compressed File (toolflyer.pdf)
            </a>
        </div>
    </main>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_ANON_KEY');

        async function handleUpload(file) {
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            status.classList.remove('hidden');

            const fileName = `temp_${Date.now()}_${file.name}`;
            
            // Logic for Partition Upload (> 50MB)
            if (file.size > 50 * 1024 * 1024) {
                statusText.innerText = "Large file detected: Uploading in chunks...";
                // Supabase TUS upload logic handles large files automatically
                const { data, error } = await supabase.storage.from('pdfs').upload(fileName, file, {
                    cacheControl: '3600',
                    upsert: false
                });
            } else {
                const { data, error } = await supabase.storage.from('pdfs').upload(fileName, file);
            }

            // After Upload: Call Compression API
            processCompression(fileName);
        }

        async function processCompression(fileName) {
            statusText.innerText = "Compressing... Please wait.";
            // Yahan hum Supabase Edge Function ko call karenge jo data clean karega
            // Server-side processing code niche hai
        }
    </script>
</body>
</html>
