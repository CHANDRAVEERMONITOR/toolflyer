<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolFlyer - All-in-One Online PDF & Image Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Tool Card Styling inspired by the image */
        .tool-card {
            border: 1px solid #e5e7eb;
            background-color: white;
            padding: 1rem;
            border-radius: 0.75rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .tool-card:hover {
            border-color: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1), 0 2px 4px -1px rgba(37, 99, 235, 0.06);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tighter">ToolFlyer<span class="text-blue-600">.com</span></a>
            <div class="flex items-center space-x-3">
                <span class="text-xs font-semibold bg-gray-100 text-gray-700 px-3 py-1 rounded-full">GLOBAL</span>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-6 py-12">
        <h1 class="text-3xl font-extrabold text-center tracking-tight text-gray-950 mb-12">All Web Tools</h1>

        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">PDF Tools</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
                
                <a href="/merge-pdf" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/stack-of-photos.png" alt="Merge PDF Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Merge PDF</span>
                </a>

                <a href="/pdf-to-jpg" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/jpg.png" alt="PDF to JPG Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">PDF to JPG</span>
                </a>

                <a href="/split-pdf" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/scissors.png" alt="Split PDF Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Split PDF</span>
                </a>

                <a href="/rotate-pdf" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/replace-page.png" alt="Rotate PDF Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Rotate PDF</span>
                </a>
            </div>
        </section>

        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Image Tools</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
                
                <a href="/compress-image" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/compression.png" alt="Compress Image Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Compress Image</span>
                </a>

                <a href="/resize-image" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/resize.png" alt="Resize Image Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Resize Image</span>
                </a>
            </div>
        </section>

        <section class="mb-12">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Calculators & Generators</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
                
                <a href="/age-calculator" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/age.png" alt="Age Calculator Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Age Calc</span>
                </a>

                <a href="/password-generator" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/password-check.png" alt="Password Generator Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">Pass Gen</span>
                </a>

                <a href="/qr-generator" class="tool-card">
                    <img src="https://img.icons8.com/fluency/96/qr-code.png" alt="QR Generator Icon" class="w-12 h-12 mx-auto mb-3">
                    <span class="font-semibold block text-sm text-gray-800">QR Gen</span>
                </a>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 text-gray-300 py-10 mt-16">
        <div class="container mx-auto px-6 text-center text-sm">
            <p>&copy; 2026 ToolFlyer.com - High Performance Tools.</p>
        </div>
    </footer>

</body>
</html>
