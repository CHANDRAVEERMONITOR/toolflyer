<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Age Calculator - ToolFlyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-value { display: block; font-size: 1.25rem; font-weight: 700; color: #1e40af; }
        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: 600; }
    </style>
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

    <nav class="bg-white border-b py-4">
        <div class="container mx-auto px-6">
            <a href="index.html" class="text-xl font-bold text-blue-600">ToolFlyer<span class="text-gray-800">.com</span></a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full border border-gray-100">
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center">Age Calculator</h2>
            <p class="text-gray-500 text-center mb-8">Calculate age between two dates precisely</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Date of Birth (From):</label>
                    <input type="date" id="dob" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none border-gray-300">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Age at Date (To):</label>
                    <input type="date" id="targetDate" class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none border-gray-300">
                </div>
            </div>
            
            <button onclick="calculateAge()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg text-lg mb-10">Calculate Results</button>

            <div id="resultBox" class="hidden">
                <div class="bg-blue-600 text-white p-6 rounded-2xl text-center mb-6">
                    <h3 id="mainAge" class="text-2xl font-bold"></h3>
                    <p class="opacity-80 text-sm mt-1 uppercase tracking-wider">Your Exact Age</p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="stat-card">
                        <span id="totalMonths" class="stat-value">0</span>
                        <span class="stat-label">Total Months</span>
                    </div>
                    <div class="stat-card">
                        <span id="totalWeeks" class="stat-value">0</span>
                        <span class="stat-label">Total Weeks</span>
                    </div>
                    <div class="stat-card">
                        <span id="totalDays" class="stat-value">0</span>
                        <span class="stat-label">Total Days</span>
                    </div>
                    <div class="stat-card">
                        <span id="totalHours" class="stat-value">0</span>
                        <span class="stat-label">Total Hours</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t py-8">
        <div class="container mx-auto px-6">
            <div class="flex flex-wrap justify-center gap-6 text-sm font-semibold text-gray-500 mb-4">
                <a href="about.html" class="hover:text-blue-600">About Us</a>
                <a href="contact.html" class="hover:text-blue-600">Contact Us</a>
                <a href="disclaimer.html" class="hover:text-blue-600">Disclaimer</a>
                <a href="privacy-policy.html" class="hover:text-blue-600">Privacy Policy</a>
            </div>
            <p class="text-center text-xs text-gray-400">© 2026 ToolFlyer.com - All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Default target date to Today
        document.getElementById('targetDate').valueAsDate = new Date();

        function calculateAge() {
            const dobVal = document.getElementById('dob').value;
            const targetVal = document.getElementById('targetDate').value;

            if (!dobVal || !targetVal) {
                alert("Please select both dates!");
                return;
            }

            const birthDate = new Date(dobVal);
            const endDate = new Date(targetVal);

            if (endDate < birthDate) {
                alert("Target date cannot be earlier than Date of Birth!");
                return;
            }

            let years = endDate.getFullYear() - birthDate.getFullYear();
            let months = endDate.getMonth() - birthDate.getMonth();
            let days = endDate.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                days += new Date(endDate.getFullYear(), endDate.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            // Calculations for Statistics
            const diffInMs = endDate - birthDate;
            const totDays = Math.floor(diffInMs / (1000 * 60 * 60 * 24));
            const totWeeks = Math.floor(totDays / 7);
            const totMonths = (years * 12) + months;
            const totHours = totDays * 24;

            // Display Results
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('mainAge').innerText = `${years} Years, ${months} Months, ${days} Days`;
            document.getElementById('totalMonths').innerText = totMonths.toLocaleString();
            document.getElementById('totalWeeks').innerText = totWeeks.toLocaleString();
            document.getElementById('totalDays').innerText = totDays.toLocaleString();
            document.getElementById('totalHours').innerText = totHours.toLocaleString();
        }
    </script>
</body>
</html>
