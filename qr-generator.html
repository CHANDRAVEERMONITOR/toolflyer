<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced QR Generator - ToolFlyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .config-card { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <nav class="bg-white border-b py-4">
        <div class="container mx-auto px-6">
            <a href="index.html" class="text-xl font-bold text-blue-600">ToolFlyer<span class="text-gray-800">.com</span></a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10 flex-grow">
        <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="space-y-6">
                <div class="config-card shadow-sm">
                    <h2 class="text-xl font-bold mb-4">QR Customization</h2>
                    
                    <div class="mb-4">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Text or URL:</label>
                        <input type="text" id="qr-data" placeholder="https://example.com" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Select Design:</label>
                        <select id="qr-dots" class="w-full p-3 border rounded-xl outline-none border-gray-300">
                            <option value="square">Simple Square</option>
                            <option value="dots">Dots Style</option>
                            <option value="rounded">Rounded Style</option>
                            <option value="extra-rounded">Extra Rounded</option>
                        </select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">Upload Logo/Photo (Optional):</label>
                        <input type="file" id="qr-logo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>

                    <button onclick="generateQR()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-md">Generate Advanced QR</button>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center bg-white rounded-3xl border border-dashed border-gray-300 p-10 shadow-inner">
                <div id="canvas-container"></div>
                <div id="download-btn-container" class="mt-8 hidden">
                    <button onclick="downloadQR()" class="bg-green-600 text-white px-8 py-3 rounded-full font-bold hover:bg-green-700 transition flex items-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        Download PNG
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-white border-t py-8 mt-10">
        <div class="container mx-auto px-6 text-center">
            <div class="flex justify-center gap-6 text-sm font-bold text-gray-500 mb-4">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="disclaimer.html">Disclaimer</a>
                <a href="privacy-policy.html">Privacy Policy</a>
            </div>
            <p class="text-xs text-gray-400">© 2026 ToolFlyer.com - High Quality QR Generator</p>
        </div>
    </footer>

    <script>
        let qrCode;
        const canvasContainer = document.getElementById("canvas-container");

        function generateQR() {
            const data = document.getElementById("qr-data").value;
            const dotStyle = document.getElementById("qr-dots").value;
            const logoFile = document.getElementById("qr-logo").files[0];

            if (!data) {
                alert("Please enter some data!");
                return;
            }

            canvasContainer.innerHTML = ""; // Clear old QR

            let logoUrl = "";
            if (logoFile) {
                logoUrl = URL.createObjectURL(logoFile);
            }

            qrCode = new QRCodeStyling({
                width: 300,
                height: 300,
                type: "svg",
                data: data,
                image: logoUrl,
                dotsOptions: {
                    color: "#000000",
                    type: dotStyle
                },
                backgroundOptions: {
                    color: "#ffffff",
                },
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 5,
                    imageSize: 0.4
                }
            });

            qrCode.append(canvasContainer);
            document.getElementById("download-btn-container").classList.remove("hidden");
        }

        function downloadQR() {
            if (qrCode) {
                qrCode.download({ name: "toolflyer-qr", extension: "png" });
            }
        }
    </script>
</body>
</html>
