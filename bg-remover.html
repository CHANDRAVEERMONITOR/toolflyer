<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ToolFlyer AI Background Remover</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"><style>

body{
font-family:Poppins;
background:#f5f6fa;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

.upload{
border:2px dashed #aaa;
padding:40px;
border-radius:15px;
cursor:pointer;
background:white;
max-width:500px;
margin:auto;
}

button{
padding:14px 30px;
border:none;
background:#6c5ce7;
color:white;
font-size:16px;
border-radius:25px;
margin-top:20px;
cursor:pointer;
}

canvas{
max-width:100%;
margin-top:20px;
border-radius:10px;
}

.colors{
margin-top:15px;
}

.color{
width:35px;
height:35px;
border-radius:50%;
display:inline-block;
margin:5px;
cursor:pointer;
border:2px solid white;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

</style></head>
<body><h1>ToolFlyer AI Background Remover</h1>
<p>Upload image → AI removes background instantly</p><div class="upload" onclick="fileInput.click()">
Click to Upload Image
<input type="file" id="fileInput" hidden accept="image/*">
</div><div id="editor" style="display:none"><div class="colors"><div class="color" style="background:#ffffff" onclick="setBg('#ffffff')"></div>
<div class="color" style="background:#3498db" onclick="setBg('#3498db')"></div>
<div class="color" style="background:#2ecc71" onclick="setBg('#2ecc71')"></div>
<div class="color" style="background:#e74c3c" onclick="setBg('#e74c3c')"></div>
<div class="color" style="background:transparent;border:1px solid #ccc" onclick="setBg('transparent')"></div></div><canvas id="canvas"></canvas>

<br><button onclick="downloadImg()">Download PNG</button>

</div><script type="module">

import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal/+esm";

let imgElement=null;
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

fileInput.onchange=async function(){

const file=this.files[0];

if(!file)return;

alert("AI processing... please wait");

const blob=await removeBackground(file);

imgElement=new Image();

imgElement.src=URL.createObjectURL(blob);

imgElement.onload=function(){

let max=1200;

let w=imgElement.width;
let h=imgElement.height;

if(w>max||h>max){

if(w>h){

h=h*(max/w);
w=max;

}else{

w=w*(max/h);
h=max;

}

}

canvas.width=w;
canvas.height=h;

ctx.clearRect(0,0,w,h);
ctx.drawImage(imgElement,0,0,w,h);

document.getElementById("editor").style.display="block";

}

}

window.setBg=function(color){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(color!="transparent"){

ctx.fillStyle=color;
ctx.fillRect(0,0,canvas.width,canvas.height);

}

ctx.drawImage(imgElement,0,0,canvas.width,canvas.height);

}

window.downloadImg=function(){

const link=document.createElement("a");

link.download="ToolFlyer.png";

link.href=canvas.toDataURL("image/png");

link.click();

}

</script></body>
</html>
